<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="16" fill="#1C1008"/>
  <!-- Grid pattern icon -->
  <!-- Vertical lines -->
  <line x1="80" y1="50" x2="80" y2="120" stroke="#E8610A" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="50" x2="100" y2="120" stroke="#E8610A" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="50" x2="120" y2="120" stroke="#E8610A" stroke-width="3" stroke-linecap="round"/>
  <!-- Horizontal lines -->
  <line x1="65" y1="65" x2="135" y2="65" stroke="#E8610A" stroke-width="3" stroke-linecap="round"/>
  <line x1="65" y1="85" x2="135" y2="85" stroke="#E8610A" stroke-width="3" stroke-linecap="round"/>
  <line x1="65" y1="105" x2="135" y2="105" stroke="#E8610A" stroke-width="3" stroke-linecap="round"/>
  <!-- Ground line -->
  <line x1="60" y1="120" x2="140" y2="120" stroke="#E8610A" stroke-width="4" stroke-linecap="round"/>
  <!-- Text -->
  <text x="100" y="146" font-family="Arial Black, sans-serif" font-size="12" font-weight="900" text-anchor="middle" fill="#FFFFFF" letter-spacing="2">PRITHIVI GRID</text>
  <text x="100" y="163" font-family="Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#E8610A" letter-spacing="2">CONSTRUCTION</text>
</svg>
