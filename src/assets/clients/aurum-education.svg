<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="16" fill="#1A1200"/>
  <!-- Laurel / graduation cap accent -->
  <!-- Cap board -->
  <polygon points="100,50 140,68 100,86 60,68" fill="#D4AF37"/>
  <!-- Cap top -->
  <rect x="96" y="44" width="8" height="8" rx="1" fill="#D4AF37"/>
  <!-- Tassel -->
  <line x1="140" y1="68" x2="140" y2="88" stroke="#D4AF37" stroke-width="2"/>
  <circle cx="140" cy="90" r="3" fill="#D4AF37"/>
  <!-- Graduation gown collar (arc lines) -->
  <line x1="80" y1="86" x2="80" y2="110" stroke="#D4AF37" stroke-width="2" stroke-dasharray="4,2" opacity="0.6"/>
  <line x1="120" y1="86" x2="120" y2="110" stroke="#D4AF37" stroke-width="2" stroke-dasharray="4,2" opacity="0.6"/>
  <!-- Decorative stars -->
  <circle cx="70" cy="100" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="130" cy="100" r="2" fill="#D4AF37" opacity="0.5"/>
  <!-- Text -->
  <text x="100" y="138" font-family="Georgia, serif" font-size="20" font-weight="700" text-anchor="middle" fill="#D4AF37" letter-spacing="3">AURUM</text>
  <rect x="50" y="143" width="100" height="1" fill="#D4AF37" opacity="0.4"/>
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#FFFFFF" letter-spacing="3" opacity="0.8">EDUCATION</text>
</svg>
