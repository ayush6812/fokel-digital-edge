<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D0D1A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FF6B00;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <!-- Ambient glow in top-right -->
  <ellipse cx="650" cy="80" rx="250" ry="200" fill="url(#glow)" opacity="0.6"/>
  
  <!-- Grid floor perspective -->
  <g opacity="0.15" stroke="#FF6B00" stroke-width="1">
    <!-- Horizontal lines converging -->
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="340" x2="800" y2="340"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="0" y1="380" x2="800" y2="380"/>
    <!-- Vertical perspective lines -->
    <line x1="100" y1="250" x2="100" y2="400"/>
    <line x1="200" y1="250" x2="200" y2="400"/>
    <line x1="300" y1="250" x2="300" y2="400"/>
    <line x1="400" y1="250" x2="400" y2="400"/>
    <line x1="500" y1="250" x2="500" y2="400"/>
    <line x1="600" y1="250" x2="600" y2="400"/>
    <line x1="700" y1="250" x2="700" y2="400"/>
  </g>
  
  <!-- Abstract desk silhouette (simplified workspace feel) -->
  <!-- Left desk -->
  <rect x="80" y="200" width="200" height="80" rx="4" fill="#252545" opacity="0.8"/>
  <rect x="100" y="160" width="140" height="45" rx="3" fill="#2A2A4A" opacity="0.9"/>
  <!-- Monitor glow -->
  <rect x="105" y="163" width="130" height="38" rx="2" fill="#1A1A3A"/>
  <rect x="108" y="166" width="124" height="33" rx="1" fill="#0A0A1A" opacity="0.9"/>
  <!-- Screen glow orange reflection -->
  <rect x="108" y="166" width="124" height="33" rx="1" fill="#FF6B00" opacity="0.08"/>
  <!-- Cursor light -->
  <rect x="165" y="178" width="2" height="14" rx="1" fill="#FF6B00" opacity="0.7"/>
  <!-- Keyboard -->
  <rect x="110" y="212" width="120" height="18" rx="3" fill="#1E1E3A"/>
  
  <!-- Right desk (farther) -->
  <rect x="520" y="210" width="180" height="70" rx="4" fill="#252545" opacity="0.7"/>
  <rect x="535" y="175" width="120" height="38" rx="3" fill="#2A2A4A" opacity="0.8"/>
  <rect x="540" y="178" width="110" height="32" rx="2" fill="#0A0A1A" opacity="0.9"/>
  <rect x="540" y="178" width="110" height="32" rx="2" fill="#FF6B00" opacity="0.05"/>
  
  <!-- Orange accent strip wall -->
  <rect x="0" y="130" width="800" height="4" rx="2" fill="#FF6B00" opacity="0.3"/>
  
  <!-- "22" large watermark -->
  <text x="400" y="240" font-family="Arial Black, sans-serif" font-size="180" font-weight="900" text-anchor="middle" fill="#FF6B00" opacity="0.04">22</text>
  
  <!-- Brand text overlay -->
  <text x="80" y="90" font-family="Arial Black, sans-serif" font-size="40" font-weight="900" fill="#FFFFFF">22workspace</text>
  <text x="80" y="118" font-family="Arial, sans-serif" font-size="15" fill="#FF6B00" letter-spacing="4">COWORKING · NEW DELHI</text>
  
  <!-- Tagline -->
  <text x="80" y="148" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.5">Premium Plug-and-Play Community Hub</text>
</svg>
