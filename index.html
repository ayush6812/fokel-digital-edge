    <!-- Theme init: apply before React mounts to prevent flash -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('fokel-theme');
          if (t === 'light') document.documentElement.classList.remove('dark');
          else document.documentElement.classList.add('dark');
        } catch(e) {}
      })();
    </script>
